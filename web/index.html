<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Kawasan Kumuh</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f6f8fb; color: #1f2937; }
    .cards { display: grid; grid-template-columns: repeat(4, minmax(170px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .card { background: white; padding: 14px; border-radius: 10px; box-shadow: 0 1px 5px rgba(0,0,0,.08); }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: 10px; font-size: 14px; }
    th { background: #0f766e; color: white; position: sticky; top: 0; }
    .filter { margin: 12px 0; display: flex; gap: 8px; flex-wrap: wrap; }
    input, select, button { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { background: #0f766e; color: white; border: none; cursor: pointer; }
    .meta { display:flex; justify-content:space-between; align-items:center; margin:10px 0; font-size: 13px; color:#4b5563; }
    .pagination { display:flex; gap:6px; align-items:center; }
    .pagination button[disabled] { background:#9ca3af; cursor:not-allowed; }
    .table-wrap { max-height: 60vh; overflow: auto; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>Dashboard Kawasan Kumuh</h1>
  <p>Tabel langsung tampil saat web dibuka. Data interaktif dari CSV.</p>

  <section class="cards">
    <article class="card"><strong>Total Data</strong><div id="totalData">0</div></article>
    <article class="card"><strong>Total Kecamatan</strong><div id="totalKecamatan">0</div></article>
    <article class="card"><strong>Rata-rata Bobot</strong><div id="avgBobot">0</div></article>
    <article class="card"><strong>Total Luas (Ha)</strong><div id="sumLuas">0</div></article>
  </section>

  <div class="filter">
    <input id="searchInput" type="text" placeholder="Cari RT/RW, kampung, desa..." />
    <select id="kecamatanFilter"><option value="">Semua Kecamatan</option></select>
    <select id="kewenanganFilter"><option value="">Semua Kewenangan</option></select>
    <select id="pageSizeSelect">
      <option value="10">10 / halaman</option>
      <option value="25" selected>25 / halaman</option>
      <option value="50">50 / halaman</option>
    </select>
    <button id="reloadBtn">Muat Ulang Data</button>
  </div>

  <div class="meta">
    <span id="resultInfo">Menampilkan 0 data</span>
    <div class="pagination">
      <button id="prevBtn">Sebelumnya</button>
      <span id="pageInfo">Hal 1/1</span>
      <button id="nextBtn">Berikutnya</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>RT/RW</th><th>Kampung</th><th>Desa</th><th>Kecamatan</th><th>Luas (Ha)</th><th>Kewenangan</th><th>Bobot</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    const CSV_PATHS = ['../data/sumber_data_baru.csv'];
    const state = { rawData: [], filtered: [], page: 1, pageSize: 25 };

    const el = {
      searchInput: document.getElementById('searchInput'), kecamatanFilter: document.getElementById('kecamatanFilter'), kewenanganFilter: document.getElementById('kewenanganFilter'),
      pageSizeSelect: document.getElementById('pageSizeSelect'), tableBody: document.getElementById('tableBody'), reloadBtn: document.getElementById('reloadBtn'),
      resultInfo: document.getElementById('resultInfo'), pageInfo: document.getElementById('pageInfo'), prevBtn: document.getElementById('prevBtn'), nextBtn: document.getElementById('nextBtn'),
      totalData: document.getElementById('totalData'), totalKecamatan: document.getElementById('totalKecamatan'), avgBobot: document.getElementById('avgBobot'), sumLuas: document.getElementById('sumLuas')
    };

    function parseCsv(csvText) {
      const lines = csvText.trim().split(/\r?\n/);
      const headers = lines[0].split(',').map(h => h.trim());
      const idx = Object.fromEntries(headers.map((h, i) => [h, i]));
      const get = (cols, keys) => {
        for (const key of keys) {
          if (idx[key] !== undefined) return (cols[idx[key]] || '').trim();
        }
        return '';
      };

      return lines.slice(1).filter(Boolean).map(line => {
        const cols = line.split(',');
        return {
          rt_rw: get(cols, ['rt_rw', 'RT/RW']),
          kampung: get(cols, ['kampung', 'KAMPUNG']),
          desa: get(cols, ['desa', 'DESA']),
          kecamatan: get(cols, ['kecamatan', 'KECAMATAN']),
          luas_ha: get(cols, ['luas_ha', 'LUAS (Ha)']),
          kewenangan: get(cols, ['kewenangan', 'KEWENANGAN']),
          bobot_kumuh: get(cols, ['bobot_kumuh', 'Bobot Kumuh'])
        };
      });
    }

    function renderStats() {
      const data = state.rawData;
      el.totalData.textContent = data.length;
      el.totalKecamatan.textContent = new Set(data.map(d => d.kecamatan)).size;
      const avg = data.length ? data.reduce((a, b) => a + Number(b.bobot_kumuh || 0), 0) / data.length : 0;
      const sum = data.reduce((a, b) => a + Number(b.luas_ha || 0), 0);
      el.avgBobot.textContent = avg.toFixed(1);
      el.sumLuas.textContent = sum.toFixed(3);
    }

    function renderFilters() {
      const kec = [...new Set(state.rawData.map(d => d.kecamatan))].sort();
      const kew = [...new Set(state.rawData.map(d => d.kewenangan))].sort();
      el.kecamatanFilter.innerHTML = '<option value="">Semua Kecamatan</option>' + kec.map(v => `<option value="${v}">${v}</option>`).join('');
      el.kewenanganFilter.innerHTML = '<option value="">Semua Kewenangan</option>' + kew.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function applyFilters() {
      const q = el.searchInput.value.toLowerCase().trim();
      const kec = el.kecamatanFilter.value;
      const kew = el.kewenanganFilter.value;
      state.filtered = state.rawData.filter(d => {
        const matchQ = !q || `${d.rt_rw} ${d.kampung} ${d.desa} ${d.kecamatan}`.toLowerCase().includes(q);
        return matchQ && (!kec || d.kecamatan === kec) && (!kew || d.kewenangan === kew);
      });
      state.page = 1;
      renderTable();
    }

    function renderTable() {
      const total = state.filtered.length;
      const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * state.pageSize;
      const end = Math.min(start + state.pageSize, total);
      const rows = state.filtered.slice(start, end);
      el.tableBody.innerHTML = rows.map(d => `<tr><td>${d.rt_rw}</td><td>${d.kampung}</td><td>${d.desa}</td><td>${d.kecamatan}</td><td>${d.luas_ha}</td><td>${d.kewenangan}</td><td>${d.bobot_kumuh}</td></tr>`).join('') || '<tr><td colspan="7">Data tidak ditemukan.</td></tr>';
      el.resultInfo.textContent = `Menampilkan ${total === 0 ? 0 : start + 1}-${end} dari ${total} data`;
      el.pageInfo.textContent = `Hal ${state.page}/${totalPages}`;
      el.prevBtn.disabled = state.page <= 1;
      el.nextBtn.disabled = state.page >= totalPages;
    }

    async function loadData() {
      let loaded = null;
      for (const path of CSV_PATHS) {
        try {
          const res = await fetch(path);
          if (res.ok) { loaded = await res.text(); break; }
        } catch (_) {}
      }
      if (!loaded) {
        el.tableBody.innerHTML = '<tr><td colspan="7">Gagal memuat CSV. Jalankan: cd web && python3 -m http.server 8000</td></tr>';
        return;
      }
      state.rawData = parseCsv(loaded);
      state.filtered = [...state.rawData];
      renderStats();
      renderFilters();
      renderTable();
    }

    el.searchInput.addEventListener('input', applyFilters);
    el.kecamatanFilter.addEventListener('change', applyFilters);
    el.kewenanganFilter.addEventListener('change', applyFilters);
    el.pageSizeSelect.addEventListener('change', () => { state.pageSize = Number(el.pageSizeSelect.value); state.page = 1; renderTable(); });
    el.prevBtn.addEventListener('click', () => { if (state.page > 1) { state.page--; renderTable(); } });
    el.nextBtn.addEventListener('click', () => { const max = Math.max(1, Math.ceil(state.filtered.length / state.pageSize)); if (state.page < max) { state.page++; renderTable(); } });
    el.reloadBtn.addEventListener('click', loadData);

    loadData();
  </script>
</body>
</html>
